<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, sans-serif; padding: 40px; background: #f5f5f5; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; max-width: 800px; }
  .item { text-align: center; }
  .item p { margin-top: 10px; font-size: 12px; color: #666; }
  .preview { display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; padding: 16px; }
  .light { background: #fff; border: 1px solid #ddd; }
  .dark { background: #1a1a1a; border: 1px solid #333; margin-top: 6px; }
  svg { width: 44px; height: 44px; }
  .dark svg { filter: invert(1); }
  h3 { margin: 28px 0 12px; color: #333; }
  .sizes { display: flex; gap: 24px; align-items: end; margin-top: 10px; }
  .sizes div { text-align: center; }
  .sizes .s16 svg { width: 16px; height: 16px; }
  .sizes .s22 svg { width: 22px; height: 22px; }
  .sizes .s44 svg { width: 44px; height: 44px; }
  .sizes span { font-size: 10px; color: #999; display: block; margin-top: 4px; }
</style>
</head>
<body>

<h2>G refined — minimal refresh in bubble</h2>

<div class="grid">

  <!-- G1: Single thin arc + tiny arrowhead -->
  <div class="item">
    <div class="preview light">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4h14a2 2 0 012 2v7a2 2 0 01-2 2h-4l-3 3-3-3H4a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="black" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M13.5 8a3 3 0 10-.3 4" stroke="black" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="preview dark">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4h14a2 2 0 012 2v7a2 2 0 01-2 2h-4l-3 3-3-3H4a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="black" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M13.5 8a3 3 0 10-.3 4" stroke="black" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <p>G1: Arc only (no arrow)</p>
  </div>

  <!-- G2: Small arc with dot at tip -->
  <div class="item">
    <div class="preview light">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4h14a2 2 0 012 2v7a2 2 0 01-2 2h-4l-3 3-3-3H4a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="black" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M13.5 8a3 3 0 10-.3 4" stroke="black" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="13.2" cy="12" r="0.9" fill="black"/>
      </svg>
    </div>
    <div class="preview dark">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4h14a2 2 0 012 2v7a2 2 0 01-2 2h-4l-3 3-3-3H4a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="black" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M13.5 8a3 3 0 10-.3 4" stroke="black" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="13.2" cy="12" r="0.9" fill="black"/>
      </svg>
    </div>
    <p>G2: Arc + dot</p>
  </div>

  <!-- G3: Just a simple circular arrow, thinner -->
  <div class="item">
    <div class="preview light">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4h14a2 2 0 012 2v7a2 2 0 01-2 2h-4l-3 3-3-3H4a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="black" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M14 8.5a3 3 0 10-.5 3.5" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M13.5 12l1.8 0" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="preview dark">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4h14a2 2 0 012 2v7a2 2 0 01-2 2h-4l-3 3-3-3H4a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="black" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M14 8.5a3 3 0 10-.5 3.5" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M13.5 12l1.8 0" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <p>G3: Arc + tick</p>
  </div>

  <!-- G4: Bubble with just two small opposing arrows (ultra minimal) -->
  <div class="item">
    <div class="preview light">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4h14a2 2 0 012 2v7a2 2 0 01-2 2h-4l-3 3-3-3H4a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="black" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M8 8.5h6" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M12.5 7l1.5 1.5-1.5 1.5" stroke="black" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 11.5H8" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M9.5 10l-1.5 1.5 1.5 1.5" stroke="black" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="preview dark">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 4h14a2 2 0 012 2v7a2 2 0 01-2 2h-4l-3 3-3-3H4a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="black" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M8 8.5h6" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M12.5 7l1.5 1.5-1.5 1.5" stroke="black" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 11.5H8" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M9.5 10l-1.5 1.5 1.5 1.5" stroke="black" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p>G4: Two-way arrows</p>
  </div>

</div>

</body>
</html>
